<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MakeX Lebanon 2026</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#475569}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px;display:grid;gap:20px}
    .hero,.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px}
    .badge{display:inline-block;background:#e2e8f0;color:#334155;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .muted{color:var(--muted)}
    .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    a.button{display:block;text-decoration:none;padding:18px;border-radius:18px;border:1px solid var(--border);background:white;color:var(--text);font-weight:700}
    a.button small{display:block;margin-top:8px;color:var(--muted);font-weight:400}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="badge">MakeX Lebanon 2026</span>
      <h1 style="margin-top:16px;margin-bottom:12px">Competition Preview Pages</h1>
      <p class="muted">Choose the page you want to open.</p>
    </section>

    <section class="grid">
      <a class="button" href="judge-panel-v2.html">
        Judge Page
        <small>Judge actions, score, time, signature</small>
      </a>

      <a class="button" href="admin-results.html">
        Admin Page
        <small>Finished, absent, delayed, signature image</small>
      </a>

      <a class="button" href="display-screen.html">
        Display Screen
        <small>Now, next, prepare for public screen</small>
      </a>

      <a class="button" href="judge-admin-flow-v2.html">
        Judge → Admin Flow
        <small>Combined flow preview on one page</small>
      </a>
    </section>
  </div>
</body>
</html>
